# Top-level configuration
name = "vms-local"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

vars = { NODE_ENV = "development", NODE_VERSION = "22.12.0", BASE_URL = "http://localhost:8787" }

workers_dev = true
keep_vars = true

[[d1_databases]]
binding = "database"
database_name = "vms-local-db"
database_id = "vms-local-db"

[[kv_namespaces]]
binding = "kv"
id ="e807e1c2091b47ab8b963d1da8ca630f"
preview_id = "kv-store-dev-preview"

[env.dev]
name = "vms-dev"

vars = { NODE_ENV = "development", NODE_VERSION = "22.12.0" }

[env.production]
name = "vms"

vars = { NODE_ENV = "production", NODE_VERSION = "22.12.0" }
