# Top-level configuration
name = "vms-local"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public/"
binding = "ASSETS"

[vars]
NODE_ENV = "local"
NODE_VERSION = "22.12.0"
BASE_URL = "http://localhost:8787"
SENDER_EMAIL = "jsi04049@gmail.com"

workers_dev = true
keep_vars = true

[[d1_databases]]
binding = "database"
database_name = "vms-local-db"
database_id = "vms-local-db"

[[kv_namespaces]]
binding = "SESSION_TOKENS"
id = "cdaa5de8aaa9471697f014631d8f41a0"
preview_id = "kv-session-token-dev"

[[kv_namespaces]]
binding = "ACTIVATION_TOKENS"
id = "c9a8ccde35684c3fb605416bc43737ff"
preview_id = "kv-activation-token-dev"


[env.dev]
name = "vms-dev"

[env.dev.vars]
NODE_ENV = "development"
NODE_VERSION = "22.12.0"

[env.production]
name = "vms"

[env.production.vars]
NODE_ENV = "production"
NODE_VERSION = "22.12.0"
BASE_URL = "https://torontojs.com"
SENDER_EMAIL = "organizers@torontojs.com"
